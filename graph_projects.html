#cleg{display:flex;flex-wrap:wrap;gap:3px 8px;align-items:center;justify-content:flex-end;max-width:660px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:#606060;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.cl-item:hover{border-color:rgba(255,255,255,.18);color:#c0b8a8}
.cl-item.active{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);color:#e0d9ce}
.cl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cl-count{opacity:.5;font-size:7px}
#gc{position:fixed;inset:0;z-index:1}svg{width:100%;height:100%}
.link{stroke-opacity:.2;transition:stroke-opacity .2s;stroke-linecap:round}
.link.hi{stroke-opacity:.85;stroke-width:2.4px!important}.link.dim{stroke-opacity:.025}
.node{cursor:pointer}.node .nc{transition:filter .22s,opacity .22s}
.node.hi .nc{filter:brightness(1.4) drop-shadow(0 0 12px var(--c))}
.node.dim .nc,.node.dim .ring{opacity:.06}.node.dim .dlab,.node.dim .nl{opacity:.04}
.ring{transition:opacity .22s}
.nl{font-family:'Raleway',sans-serif;font-weight:500;fill:#ede5d8;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:#0b0d14;stroke-width:3.5px;transition:opacity .22s}
.node.hi .nl{fill:#fff;font-weight:600}
.dlab{font-family:'Raleway',sans-serif;font-weight:700;fill:rgba(255,255,255,.92);pointer-events:none;dominant-baseline:central;text-anchor:middle;transition:opacity .22s}
#tt{position:fixed;z-index:40;background:rgba(10,12,20,.97);border:1px solid rgba(190,170,110,.16);padding:14px 18px;max-width:305px;min-width:190px;pointer-events:none;opacity:0;transition:opacity .14s;backdrop-filter:blur(14px)}
#tt.show{opacity:1}#tt h3{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:17px;color:#e0d9ce;line-height:1.3;margin-bottom:5px}

.tt-cn{margin-top:8px}.tt-cn-h{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:#454038;margin-bottom:4px}

#sw{position:fixed;top:56px;right:22px;z-index:30}
#srch{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#a09888;font-family:'Raleway',sans-serif;font-size:11px;font-weight:300;padding:6px 12px;width:180px;outline:none;letter-spacing:.05em;border-radius:2px}
#srch::placeholder{color:#3a3830}#srch:focus{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07)}
#ctrls{position:fixed;bottom:20px;right:20px;z-index:30;display:flex;flex-direction:column;gap:6px}
.cbtn{width:33px;height:33px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);color:#686056;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:background .18s,color .18s}
.cbtn:hover{background:rgba(255,255,255,.1);color:#e0d9ce}

@keyframes fp{0%,100%{opacity:.5}50%{opacity:1}}

const tt=document.getElementById('tt');let sel=null;
function nbrs(d){const ids=new Set([d.id]);edges.forEach(e=>{const s=e.source.id||e.source,t=e.target.id||e.target;if(s===d.id)ids.add(t);if(t===d.id)ids.add(s);});return ids;}
function filterByCluster(cid){clearSel();node.classed('dim',n=>n.cluster!==cid);node.classed('hi',false);link.classed('dim',e=>{const s=NM[e.source.id||e.source],t=NM[e.target.id||e.target];return!(s?.cluster===cid||t?.cluster===cid);});link.classed('hi',false);tt.classList.remove('show');}
function selectNode(ev,d){
  if(sel===d.id){clearSel();return;}sel=d.id;
  activeCluster=null;clegEl.querySelectorAll('.cl-item').forEach(b=>b.classList.remove('active'));
  const nb=nbrs(d);
  node.classed('hi',n=>nb.has(n.id));node.classed('dim',n=>!nb.has(n.id));
  link.classed('hi',e=>{const s=e.source.id||e.source,t=e.target.id||e.target;return s===d.id||t===d.id;});
  link.classed('dim',e=>{const s=e.source.id||e.source,t=e.target.id||e.target;return s!==d.id&&t!==d.id;});
  document.getElementById('tt-name').textContent=d.label;
  const s=cs(d.cluster);const badge=document.getElementById('tt-badge');
  badge.style.cssText=`background:${s.color}22;color:${s.color};border:1px solid ${s.color}48`;
  badge.innerHTML=`<span style="width:7px;height:7px;border-radius:50%;background:${s.color};display:inline-block"></span>${s.label}`;
  document.getElementById('tt-deg').textContent=d.deg||0;
  document.getElementById('tt-type').textContent=d.isMain?'Респондент':'Упомянут';
  const cnEl=document.getElementById('tt-cn');
  const cids=[...nb].filter(id=>id!==d.id);
  cnEl.innerHTML=cids.length?'<div class="tt-cn-h">Партнёры</div>'+cids.map(id=>{const n=NM[id];const nc=col(n?.cluster??-1);return`<div>· <b style="color:${nc}">${n?.label||id}</b></div>`;}).join(''):'<div style="font-size:10px;color:#3a3630;margin-top:4px">Нет явных партнёрств</div>';
  if(ev){let tx=ev.clientX+18,ty=ev.clientY-20;if(tx+310>W())tx=ev.clientX-318;if(ty+380>H())ty=H()-388;tt.style.left=tx+'px';tt.style.top=ty+'px';}
  tt.classList.add('show');
}
function clearSel(){sel=null;node.classed('hi dim',false);link.classed('hi dim',false);tt.classList.remove('show');}
node.on('click',(ev,d)=>{ev.stopPropagation();selectNode(ev,d);});
svg.on('click',clearSel);
document.getElementById('srch').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();if(!q){clearSel();return;}
  const found=nodes.find(n=>n.label.toLowerCase().includes(q));if(found)selectNode(null,found);
});
document.getElementById('bzin').onclick=()=>svg.transition().call(zoom.scaleBy,1.3);
document.getElementById('bzout').onclick=()=>svg.transition().call(zoom.scaleBy,0.77);
document.getElementById('brst').onclick=()=>svg.transition().duration(750).call(zoom.transform,d3.zoomIdentity.translate(W()/2,H()/2).scale(0.88).translate(-W()/2,-H()/2));
setTimeout(()=>{document.getElementById('hint').style.opacity=0;},9000);
</script></body></html>
